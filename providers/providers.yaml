# Provider Knowledge Graph
# 描述 providers、models、limits、fallback edges、error semantics
# Bandit 策略可以读取此图谱进行决策

providers:
  openai:
    name: OpenAI
    base_url: https://api.openai.com/v1
    website: https://platform.openai.com
    docs: https://platform.openai.com/docs/api-reference
    rate_limits:
      requests_per_minute: 10000
      tokens_per_minute: 500000
      concurrent_requests: 100
      model_specific:
        gpt-4o: { rpm: 10000, tpm: 500000 }
        gpt-4o-mini: { rpm: 15000, tpm: 1500000 }
        gpt-4: { rpm: 10000, tpm: 500000 }
        gpt-3.5-turbo: { rpm: 15000, tpm: 1500000 }
    error_semantics:
      rate_limit_codes: [429]
      quota_codes: [402, 403]
      key_invalid_codes: [401]
    models:
      - name: gpt-4o
        context: 128000
        max_output: 4096
        vision: true
        function_calling: true
      - name: gpt-4o-mini
        context: 128000
        max_output: 16384
        vision: true
        function_calling: true
      - name: gpt-4
        context: 8192
        max_output: 4096
        vision: false
        function_calling: true
      - name: gpt-3.5-turbo
        context: 16385
        max_output: 4096
        vision: false
        function_calling: true
    fallback_edges:
      - anthropic
      - openrouter
    tier: premium

  anthropic:
    name: Anthropic
    base_url: https://api.anthropic.com
    website: https://anthropic.com
    docs: https://docs.anthropic.com
    rate_limits:
      requests_per_minute: 4000
      tokens_per_minute: 500000
      concurrent_requests: 50
      model_specific:
        claude-3-5-sonnet-20241022: { rpm: 4000, tpm: 500000 }
        claude-3-opus-20240229: { rpm: 2000, tpm: 200000 }
        claude-3-sonnet-20240229: { rpm: 4000, tpm: 500000 }
        claude-3-haiku-20240307: { rpm: 10000, tpm: 1000000 }
    error_semantics:
      rate_limit_codes: [429]
      quota_codes: [402, 403]
      key_invalid_codes: [401]
    models:
      - name: claude-3-5-sonnet-20241022
        context: 200000
        max_output: 8192
        vision: true
        tools: true
      - name: claude-3-opus-20240229
        context: 200000
        max_output: 4096
        vision: true
        tools: true
      - name: claude-3-sonnet-20240229
        context: 200000
        max_output: 4096
        vision: true
        tools: true
      - name: claude-3-haiku-20240307
        context: 200000
        max_output: 4096
        vision: true
        tools: true
    fallback_edges:
      - openai
      - openrouter
    tier: premium

  openrouter:
    name: OpenRouter
    base_url: https://openrouter.ai/api/v1
    website: https://openrouter.ai
    docs: https://openrouter.ai/docs
    rate_limits:
      requests_per_minute: 5000
      tokens_per_minute: 200000
      concurrent_requests: 100
      model_specific:
        mistralai/devstral-2512: { rpm: 5000, tpm: 200000 }
        openai/gpt-4o: { rpm: 10000, tpm: 500000 }
        anthropic/claude-3-5-sonnet: { rpm: 4000, tpm: 500000 }
    error_semantics:
      rate_limit_codes: [429]
      quota_codes: [402, 403]
      key_invalid_codes: [401, 403]
    models:
      - name: mistralai/devstral-2512
        context: 32000
        max_output: 8192
        vision: false
        function_calling: true
      - name: openai/gpt-4o
        context: 128000
        max_output: 4096
        vision: true
        function_calling: true
      - name: anthropic/claude-3-5-sonnet
        context: 200000
        max_output: 8192
        vision: true
        tools: true
    fallback_edges:
      - anthropic
      - openai
    tier: aggregator

knowledge_graph:
  # 边权重用于fallback选择
  fallback_weights:
    openai->anthropic: 0.9   # 相似能力
    openai->openrouter: 0.6   # 路由层
    anthropic->openai: 0.9
    anthropic->openrouter: 0.7
    openrouter->anthropic: 0.8
    openrouter->openai: 0.8

  # 错误类型映射
  error_category_map:
    429: rate_limit
    402: quota_exhausted
    403: quota_exhausted
    401: key_invalid
    500: server_error
    502: server_error
    503: server_error
    504: timeout

  # 策略推荐矩阵：错误类型 -> 推荐策略优先级
  strategy_recommendations:
    rate_limit:
      primary: reduce_concurrency
      secondary: exponential_backoff
      tertiary: switch_model
    quota_exhausted:
      primary: switch_model
      secondary: tune_params
      tertiary: exponential_backoff
    key_invalid:
      primary: do_nothing  # 需要人工介入
    server_error:
      primary: exponential_backoff
      secondary: retry_delay_5s
    timeout:
      primary: tune_params  # 减少负载
      secondary: increase_timeout
